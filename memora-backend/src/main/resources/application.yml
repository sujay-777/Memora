spring:
  application:
    name: memora-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/memora}
    username: ${DB_USERNAME:memora}
    password: ${DB_PASSWORD:memora}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:memora-secret-key}
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:memora-files}
  signed-url-expiry-minutes: 60

memora:
  llm:
    base-url: ${LLM_BASE_URL:https://api.groq.com/openai/v1}
    api-key: ${GROQ_API_KEY:your-groq-api-key-here}
    timeout-seconds: 5
    model: ${LLM_MODEL:llama3-8b-8192}
  embedding:
    base-url: ${EMBEDDING_BASE_URL:http://localhost:8000}
    timeout-seconds: 5

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.memora: DEBUG
    org.springframework.web: INFO
