version: "3.9"

# ================================================================
# Memora — local development environment
# Services: PostgreSQL · MinIO · ChromaDB
# The Spring Boot app runs on your host via Maven (port 8080).
# ================================================================

services:

  # ──────────────────────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: memora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       memora
      POSTGRES_USER:     memora_user
      POSTGRES_PASSWORD: memora_pass
    ports:
      - "5432:5432"
    volumes:
      - memora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memora_user -d memora"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # MinIO — object storage for images and PDFs
  # Console UI → http://localhost:9001  (minioadmin / minioadmin)
  # API        → http://localhost:9000
  # ──────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: memora-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - memora_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # ChromaDB — vector embeddings store
  # API → http://localhost:8000
  # ──────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: memora-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - memora_chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5

# ================================================================
# Named volumes
# ================================================================
volumes:
  memora_postgres_data:
  memora_minio_data:
  memora_chroma_data:
